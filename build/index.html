<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speelplaatsrock</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://kit.fontawesome.com/2cce60847a.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.0.min.js"></script>
  </head>
  <body>
    <!-- Hero -->
    <div class="bg-gradient-to-r from-fuchsia-500 to-lime-300">
      <div class="container h-screen flex flex-col items-center justify-center text-white animate-pulse">
        <!-- Title -->
        <span class="text-3xl md:text-6xl w-auto bg-clip-text font-extrabold text-center"> SPEELPLAATSROCK </span>

        <!-- Date -->
        <h1 class="text-2xl md:text-4xl mt-2">27.04.2024</h1>

        <!-- Arrow -->
        <svg
          class="animate-bounce absolute bottom-6 mx-auto duration-500"
          xmlns="http://www.w3.org/2000/svg"
          height="3em"
          viewBox="0 0 448 512"
        >
          <style>
            svg {
              fill: #ffffff;
            }
          </style>
          <path
            d="M246.6 470.6c-12.5 12.5-32.8 12.5-45.3 0l-160-160c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0L224 402.7 361.4 265.4c12.5-12.5 32.8-12.5 45.3 0s12.5 32.8 0 45.3l-160 160zm160-352l-160 160c-12.5 12.5-32.8 12.5-45.3 0l-160-160c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0L224 210.7 361.4 73.4c12.5-12.5 32.8-12.5 45.3 0s12.5 32.8 0 45.3z"
          />
        </svg>
      </div>
    </div>

    <!-- Sponsors -->
    <div class="container flex flex-col items-center md:items-start h-screen text-slate-800">
      <h1 class="pt-6 text-3xl md:text-6xl font-extrabold underline mb-6">Sponsors</h1>
      <div class="flex flex-col items-center md:flex-row-reverse justify-around">
        <img class="rounded-lg w-3/4 md:w-2/5" src="assets/sponsorboekje_preview.jpeg" alt="" />

        <div class="flex flex-col w-max m-12">
          <a
            class="border border-black text-center px-4 py-2 rounded m-3 mt-6 md:mt-0 hover:bg-black hover:text-white duration-300"
            href="assets/sponsorboekje2024.pdf"
            target="_blank"
            >Download ons sponsorboekje!</a
          >
          <a
            class="border border-black text-center px-4 py-2 rounded m-3 mt-6 md:mt-0 hover:bg-black hover:text-white duration-300"
            href="https://forms.gle/HWMQCjuYiNCMbLDG6"
            target="_blank"
            >Wordt sponsor!</a
          >
        </div>
      </div>
    </div>
    <div class="flex justify-center p-6 mt-6">
      <span class="text-gray-300">Made with <span class="text-red-500">♥</span> by Joenne</span>
    </div>
  </body>
</html>
